# Elvis lint + eunit for hecate-spartan. Runs on the GitHub push-mirror
# (Forgejo Actions disabled per the migration pattern). Enforces the org's
# structural ruleset: no deep nesting (one level), no nested try/catch, no if.
name: lint-and-test
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: erlang:28
    steps:
      - uses: actions/checkout@v4
      - name: Elvis lint
        run: rebar3 lint
      - name: EUnit
        run: rebar3 eunit
