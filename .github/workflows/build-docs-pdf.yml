name: Build Documentation PDFs

# Builds a PDF from docs/ and, on a tag push, attaches it to a GitHub Release.
# Runs on the GitHub mirror (Codeberg is canonical). hecate-spartan is a public
# repo, so Actions minutes are free.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc + xelatex
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-extra texlive-latex-extra fonts-dejavu

      - name: Build PDFs
        run: bash scripts/build-docs-pdf.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hecate-spartan-docs
          path: dist/*.pdf

      - name: Attach to release (on tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.pdf
